<div class="search-bar">
  <div class="engine-wrap">
    <button class="engine-btn" (click)="toggleEngineMenu($event)" [title]="engines[searchEngine()].label">
      <img class="engine-icon" [src]="engines[searchEngine()].favicon" [alt]="engines[searchEngine()].label" />
    </button>
  </div>

  <div class="divider"></div>

  <input
    [(ngModel)]="searchQuery"
    (keyup.enter)="search()"
    placeholder="Search the web..."
    class="search-input"
  />

  <button class="search-btn" (click)="search()" [disabled]="!searchQuery.trim()">
    <lucide-icon [img]="ArrowRightIcon" size="15" />
  </button>
</div>

@if (showEngineMenu()) {
  <div class="engine-dropdown"
    [style.top.px]="dropdownTop"
    [style.left.px]="dropdownLeft">
    <p class="dropdown-label">Search Engine</p>
    @for (k of engineKeys; track k) {
      <button class="dropdown-item" [class.active]="searchEngine() === k" (click)="setEngine(k)">
        <img class="engine-icon sm" [src]="engines[k].favicon" [alt]="engines[k].label" />
        {{ engines[k].label }}
      </button>
    }
  </div>
}
